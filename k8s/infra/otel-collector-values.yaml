# OpenTelemetry Collector Helm values for GRUD project
# Unified telemetry: logs, traces, metrics

# DaemonSet mode for log collection from all nodes
mode: daemonset

# Use contrib image (has filelog receiver and loki exporter)
image:
  repository: otel/opentelemetry-collector-contrib

# Resources (increased for log processing)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Tolerate all taints to run on every node
tolerations:
  - operator: "Exists"

# Service configuration
service:
  type: ClusterIP

# Ports
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  prom-exporter:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

# Presets for Kubernetes log/metadata collection
presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: false

# OpenTelemetry Collector configuration
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024

    resource:
      attributes:
        - key: cluster.name
          value: grud-cluster
          action: upsert

    memory_limiter:
      check_interval: 1s
      limit_mib: 400

    # Transform logs - parse JSON and extract fields
    transform/logs:
      log_statements:
        - context: log
          statements:
            # Parse JSON body if present
            - merge_maps(cache, ParseJSON(body), "insert") where IsMatch(body, "^\\{")
            # Extract trace_id and span_id from parsed JSON
            - set(trace_id.string, cache["trace_id"]) where cache["trace_id"] != nil
            - set(span_id.string, cache["span_id"]) where cache["span_id"] != nil
            # Set severity from level field
            - set(severity_text, cache["level"]) where cache["level"] != nil
            # Set attributes from JSON fields
            - set(attributes["service"], cache["service"]) where cache["service"] != nil
            - set(attributes["msg"], cache["msg"]) where cache["msg"] != nil
            - set(attributes["error"], cache["error"]) where cache["error"] != nil

    # Filter to focus on grud namespace (optional - remove if you want all logs)
    filter/grud:
      logs:
        include:
          match_type: regexp
          resource_attributes:
            - key: k8s.namespace.name
              value: "grud|infra"


  exporters:
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: grud
      const_labels:
        cluster: grud-cluster
      resource_to_telemetry_conversion:
        enabled: true

    otlp/tempo:
      endpoint: tempo.infra.svc.cluster.local:4317
      tls:
        insecure: true

    otlphttp/loki:
      endpoint: http://loki-gateway.infra.svc.cluster.local/otlp

    debug:
      verbosity: basic

  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [prometheus]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [otlp/tempo]
      logs:
        receivers: [filelog]
        processors: [memory_limiter, transform/logs, batch]
        exporters: [otlphttp/loki]

# ServiceMonitor for Prometheus to scrape OTel Collector
serviceMonitor:
  enabled: true
  extraLabels:
    release: prometheus
  metricsEndpoints:
    - port: prom-exporter
      interval: 15s
